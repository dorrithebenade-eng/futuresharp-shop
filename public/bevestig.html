<!DOCTYPE html>
<html lang="af">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bevestig — Future Shop</title>
  <link rel="stylesheet" href="/css/styl.css" />

  <!--
    LET WEL — soos met aanmeld.html/my-boeke.html: kopieer die werklike
    <nav>/kop-blokke/voetskrif-opmaak vanaf 'n bestaande bladsy hierheen
    sodat dit dieselfde voorkoms as die res van die winkel het.
  -->
</head>
<body>

  <main class="inhoud-area aanmeld-area">
    <section id="bevestig-blok">
      <h1 data-i18n="bevestig_titel">Stel jou wagwoord</h1>
      <p id="bevestig-hulp" data-i18n="bevestig_hulp">
        Stel 'n wagwoord om jou rekening klaar te maak.
      </p>

      <form id="bevestig-vorm" novalidate>
        <label for="bevestig-wagwoord" data-i18n="wagwoord_etiket">Wagwoord</label>
        <input type="password" id="bevestig-wagwoord" name="wagwoord" required
               autocomplete="new-password" minlength="8" />

        <button type="submit" class="knoppie knoppie--primer" data-i18n="bevestig_knoppie">
          Bevestig
        </button>
      </form>
    </section>

    <section id="bevestig-fout-blok" hidden>
      <h1 data-i18n="bevestig_fout_titel">Hierdie skakel werk nie meer nie</h1>
      <p data-i18n="bevestig_fout_hulp">
        Die skakel is dalk reeds gebruik, of het verval. Probeer weer registreer of aanmeld.
      </p>
      <a href="/aanmeld.html" data-i18n="terug_na_aanmeld">Terug na aanmeld</a>
    </section>

    <div id="bevestig-boodskap" aria-live="polite"></div>
  </main>

  <script src="/js/taal.js"></script>
  <script src="/js/identiteit.js"></script>
  <script src="/js/bevestig.js"></script>
</body>
</html>
