<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // MOET voor die Identity-widget se eie skrip loop — sien nota in
    // mandjie.js vir hoekom. Netlify se e-pos-skakels (bevestiging,
    // uitnodiging, wagwoord-herstel) land altyd hier met 'n token in
    // die URL; op die oomblik het net personeel rekeninge, so ons stuur
    // dit dadelik na die paneelbord toe voor die widget dit self "opeet".
    //
    // ⚠️ FASE 5-GAPING (nog nie opgelos nie): nou dat kopers ook
    // bevestigings-/herstel-skakels via identiteit.js/aanmeld.html kry,
    // sal HULLE s'n ook per ongeluk hierheen na paneelbord.html herlei
    // word — verkeerd vir 'n koper. Sodra bevestig.html gebou is, moet
    // hierdie logika koper- vs. personeel-tokens kan onderskei (bv. deur
    // eers die gebruiker se rol na te gaan, of deur 'n aparte
    // e-pos-sjabloon/redirect_to vir koper- vs. personeel-registrasie in
    // die Netlify Identity-instellings te gebruik).
    (function () {
      var identiteitsTokenPatroon = /(confirmation_token|invite_token|recovery_token|email_change_token)=/;
      if (identiteitsTokenPatroon.test(window.location.hash)) {
        window.location.replace("bevestig.html" + window.location.hash);
      }
    })();
  </script>
